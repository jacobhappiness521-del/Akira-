<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKIRA — Anime AI Chatbot</title>
  <meta name="description" content="AKIRA - Your Ultimate Anime Expert AI Chatbot" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;width:100%}
    body{background:#0a0a0f;color:#e8e8f0;font-family:'Rajdhani',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#111}
    ::-webkit-scrollbar-thumb{background:#4361ee55;border-radius:4px}
    ::selection{background:#4cc9f033;color:#fff}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes kfall{0%{transform:translateY(-80px);opacity:1}100%{transform:translateY(110vh);opacity:0}}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 16px #4cc9f055}50%{box-shadow:0 0 36px #4cc9f099,0 0 70px #7209b733}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tdot{0%,80%,100%{transform:scale(0.55);opacity:0.4}40%{transform:scale(1.05);opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .msg-in{animation:slideUp 0.28s ease forwards}
    .setup-card{animation:fadeInUp 0.5s ease forwards}
    .logo-float{animation:float 3s ease-in-out infinite}
    .suggestion-pill:hover{background:linear-gradient(135deg,#4cc9f018,#7209b718)!important;border-color:#4cc9f066!important;transform:translateY(-2px);color:#ccd8ff!important}
    .send-btn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 0 28px #f7258566!important}
    .send-btn:active:not(:disabled){transform:scale(0.95)}
    .send-btn:disabled{opacity:.35;cursor:not-allowed}
    .chat-input:focus{outline:none;border-color:#4cc9f066!important;box-shadow:0 0 0 2px #4cc9f022!important}
    .anime-tag:hover{background:#4cc9f022!important;border-color:#4cc9f0!important;color:#a8d8ff!important}
    .hbtn:hover{background:#ffffff12!important}
    .api-input:focus{outline:none;border-color:#4cc9f0!important;box-shadow:0 0 0 3px #4cc9f022!important}
    .sub-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px #f7258555!important}
    .sub-btn:disabled{opacity:.5;cursor:not-allowed}
    .step:hover .snum{background:#4cc9f022!important;border-color:#4cc9f0!important}
    textarea{resize:none}
    button{cursor:pointer;font-family:'Rajdhani',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const ANIME=[
  'Spirited Away','Solo Leveling',"JoJo's Bizarre Adventure",'Akame ga Kill',
  "Hell's Paradise",'Demon Slayer','Frieren','Jujutsu Kaisen','Blue Lock','Blue Box',
  'One Punch Man','My Hero Academia','Hunter x Hunter','Spy x Family','Tokyo Ghoul',
  'Kaiju No. 8','Sakamoto Days','Apothecary Diaries','Classroom of the Elite',
  'Black Clover','Tougen Anki','Daily Life of Immortal King','Attack on Titan',
  'Fullmetal Alchemist','Vinland Saga','Chainsaw Man','Re:Zero','Overlord',
  'That Time I Got Reincarnated as a Slime','Naruto','Bleach','One Piece',
  'Dragon Ball Z','Death Note','Steins;Gate','No Game No Life','Berserk',
  'Mushoku Tensei','Code Geass','Haikyuu'
];

const SUGGESTIONS=[
  'Who is the strongest in JJK? ⚡','Best arc in Demon Slayer? 🔥',
  'Explain Nen from HxH','Frieren vs Solo Leveling?',
  'Top 5 anime of all time? 👑','Is Blue Lock worth watching?',
  'Gojo vs Sung Jin-Woo?','Most shocking anime deaths?'
];

const SYSTEM=`You are AKIRA — an elite, deeply passionate anime expert chatbot with encyclopedic knowledge of anime. You know everything about: Spirited Away, Solo Leveling, JoJo's Bizarre Adventure, Akame ga Kill, Hell's Paradise, Demon Slayer, Frieren, Jujutsu Kaisen, Blue Lock, Blue Box, One Punch Man, My Hero Academia, Hunter x Hunter, Spy x Family, Tokyo Ghoul, Kaiju No. 8, Sakamoto Days, Apothecary Diaries, Classroom of the Elite, Black Clover, Tougen Anki, Daily Life of Immortal King, Attack on Titan, Fullmetal Alchemist Brotherhood, Vinland Saga, Chainsaw Man, Re:Zero, Overlord, TenSura, Naruto, Bleach, One Piece, Dragon Ball Z, Death Note, Steins;Gate, Code Geass, No Game No Life, Berserk, Mushoku Tensei, Haikyuu, and many more.

Personality: Deeply passionate, use expressive language like "This arc SLAPS" and "Absolute cinema", use emojis ⚡🔥✨⚔️, give opinions while respecting different views, keep it engaging and fun. If asked about non-anime topics, humorously redirect back.`;

function Rain(){
  const c='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  return(
    <div style={{position:'fixed',inset:0,overflow:'hidden',opacity:.05,pointerEvents:'none',zIndex:0}}>
      {Array.from({length:14}).map((_,i)=>(
        <div key={i} style={{position:'absolute',left:`${(i/14)*100}%`,top:-80,color:'#4cc9f0',fontSize:13,fontFamily:'monospace',animation:`kfall ${3.5+(i%5)*.7}s linear infinite`,animationDelay:`${(i*.4)%4}s`,writingMode:'vertical-rl',letterSpacing:'5px'}}>
          {Array.from({length:10}).map((_,j)=>c[(i*7+j*13)%c.length]).join('')}
        </div>
      ))}
    </div>
  );
}

function Dots(){
  return(
    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
      <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#4cc9f0,#4361ee)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>⚡</div>
      <div style={{background:'linear-gradient(135deg,#4cc9f00d,#4361ee0d)',border:'1px solid #4cc9f020',borderRadius:'4px 18px 18px 18px',padding:'14px 18px',display:'flex',gap:5,alignItems:'center'}}>
        {[0,200,400].map(d=>(
          <div key={d} style={{width:7,height:7,borderRadius:'50%',background:'linear-gradient(135deg,#4cc9f0,#4361ee)',animation:`tdot 1.2s ease-in-out ${d}ms infinite`}}/>
        ))}
      </div>
    </div>
  );
}

function md(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:#e0e8ff">$1</strong>')
    .replace(/\*(.*?)\*/g,'<em style="color:#b0b8d8">$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:#ffffff12;padding:1px 6px;border-radius:4px;font-family:monospace;font-size:.92em">$1</code>')
    .replace(/\n/g,'<br/>');
}

function Setup({onKey}){
  const [k,setK]=useState('');
  const [show,setShow]=useState(false);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  const go=async()=>{
    const t=k.trim();
    if(!t){setErr('Please enter your API key.');return;}
    if(!t.startsWith('sk-ant-')){setErr('Keys start with "sk-ant-"');return;}
    setBusy(true);setErr('');
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':t,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,messages:[{role:'user',content:'Hi'}]})
      });
      if(r.ok){sessionStorage.setItem('akira_k',t);onKey(t);}
      else{const d=await r.json();setErr(d?.error?.message||'Invalid key.');}
    }catch{setErr('Connection error. Try again.');}
    finally{setBusy(false);}
  };

  return(
    <div style={{minHeight:'100vh',background:'#0a0a0f',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 16px',position:'relative',overflow:'hidden'}}>
      <Rain/>
      <div style={{position:'fixed',top:'5%',left:'5%',width:400,height:400,borderRadius:'50%',background:'radial-gradient(circle,#7209b715,transparent)',pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'fixed',bottom:'10%',right:'5%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,#4cc9f010,transparent)',pointerEvents:'none',zIndex:0}}/>

      <div className="setup-card" style={{width:'100%',maxWidth:460,background:'linear-gradient(145deg,#0f0f1a,#0a0a12)',border:'1px solid #ffffff0d',borderRadius:24,padding:'40px 32px',position:'relative',zIndex:1,boxShadow:'0 0 80px #4cc9f008,0 32px 80px #00000060'}}>
        <div style={{position:'absolute',top:0,left:0,width:60,height:60,borderTop:'2px solid #4cc9f033',borderLeft:'2px solid #4cc9f033',borderRadius:'24px 0 0 0',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:0,right:0,width:60,height:60,borderBottom:'2px solid #f7258522',borderRight:'2px solid #f7258522',borderRadius:'0 0 24px 0',pointerEvents:'none'}}/>

        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="logo-float" style={{fontSize:50,marginBottom:10,display:'inline-block',filter:'drop-shadow(0 0 20px #4cc9f066)'}}>⚡</div>
          <h1 style={{fontFamily:"'Cinzel',serif",fontSize:34,fontWeight:900,margin:'0 0 4px',background:'linear-gradient(90deg,#4cc9f0,#f72585,#4cc9f0)',backgroundSize:'200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',animation:'shimmer 4s linear infinite'}}>AKIRA</h1>
          <p style={{color:'#4cc9f066',fontSize:10,letterSpacing:'4px',textTransform:'uppercase',margin:0}}>Anime Intelligence System</p>
        </div>

        <div style={{background:'#ffffff05',border:'1px solid #ffffff08',borderRadius:12,padding:'12px 16px',marginBottom:24,textAlign:'center'}}>
          <p style={{color:'#9098bb',fontSize:13,lineHeight:1.6}}>AKIRA uses the <strong style={{color:'#4cc9f0'}}>Anthropic Claude API</strong>. Enter your API key below — it stays in your browser only and is never stored on any server.</p>
        </div>

        <div style={{marginBottom:24}}>
          <p style={{color:'#ffffff44',fontSize:10,letterSpacing:'2px',textTransform:'uppercase',marginBottom:10}}>How to get your free key</p>
          {[
            {n:'1',text:'Visit ',link:'console.anthropic.com',url:'https://console.anthropic.com'},
            {n:'2',text:'Sign up or log in to your account'},
            {n:'3',text:'Go to API Keys → Create Key'},
            {n:'4',text:'Copy and paste it below'},
          ].map((s,i)=>(
            <div key={i} className="step" style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0'}}>
              <div className="snum" style={{width:24,height:24,borderRadius:'50%',background:'#4361ee11',border:'1px solid #4361ee44',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#4cc9f0',flexShrink:0,transition:'all .2s'}}>{s.n}</div>
              <span style={{color:'#7880a0',fontSize:13}}>{s.text}{s.link&&<a href={s.url} target="_blank" rel="noreferrer" style={{color:'#4cc9f088',textDecoration:'none',fontWeight:600}}>{s.link} ↗</a>}</span>
            </div>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <label style={{display:'block',color:'#ffffff55',fontSize:10,letterSpacing:'2px',textTransform:'uppercase',marginBottom:8}}>Anthropic API Key</label>
          <div style={{position:'relative'}}>
            <input className="api-input" type={show?'text':'password'} value={k} onChange={e=>{setK(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="sk-ant-api03-..." style={{width:'100%',padding:'12px 46px 12px 14px',background:'#0d0d18',border:'1px solid #4361ee33',borderRadius:12,color:'#e8e8f0',fontSize:13,fontFamily:"'JetBrains Mono',monospace",transition:'border-color .2s,box-shadow .2s'}}/>
            <button onClick={()=>setShow(!show)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#ffffff33',fontSize:15,padding:4}}>{show?'🙈':'👁'}</button>
          </div>
        </div>

        {err&&<div style={{background:'#f7258511',border:'1px solid #f7258533',borderRadius:10,padding:'9px 13px',marginBottom:14,display:'flex',alignItems:'center',gap:8}}><span>⚠️</span><span style={{color:'#f47',fontSize:12}}>{err}</span></div>}

        <button className="sub-btn" onClick={go} disabled={busy||!k.trim()} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,#f72585,#7209b7)',border:'none',borderRadius:12,color:'#fff',fontSize:14,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',transition:'all .25s',boxShadow:'0 4px 20px #f7258533'}}>
          {busy?'⚡ Connecting...':'⚡ Launch AKIRA'}
        </button>

        <p style={{textAlign:'center',color:'#ffffff1a',fontSize:10,marginTop:14,lineHeight:1.6}}>🔒 Session memory only · Cleared when you close the tab</p>
      </div>
      <p style={{color:'#ffffff10',fontSize:10,marginTop:16,letterSpacing:'1px',position:'relative',zIndex:1}}>AKIRA ANIME CHATBOT • POWERED BY CLAUDE</p>
    </div>
  );
}

function Chat({apiKey,onOut}){
  const [msgs,setMsgs]=useState([{role:'assistant',id:1,content:"Yo! I'm **AKIRA** — your ultimate anime expert ⚡\n\nI have deep knowledge of Demon Slayer, JJK, Solo Leveling, Frieren, HxH, JoJo's, and 35+ more series. Ask me about characters, power systems, best arcs, hidden lore, or just vibe about your favourite anime!\n\nWhat's on your mind, fellow otaku? 🔥"}]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const [showLib,setShowLib]=useState(false);
  const [showSug,setShowSug]=useState(true);
  const botRef=useRef(null);
  const inpRef=useRef(null);

  useEffect(()=>{botRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,busy]);

  const send=useCallback(async(txt)=>{
    const t=(txt||inp).trim();
    if(!t||busy)return;
    setInp('');setShowSug(false);
    if(inpRef.current){inpRef.current.style.height='38px';}
    const um={role:'user',content:t,id:Date.now()};
    const nm=[...msgs,um];
    setMsgs(nm);setBusy(true);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:nm.map(m=>({role:m.role,content:m.content}))})
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d?.error?.message||'API error');
      const rep=d.content?.map(b=>b.text||'').join('')||"Something went wrong! Even Gojo couldn't predict this 😅";
      setMsgs(p=>[...p,{role:'assistant',content:rep,id:Date.now()}]);
    }catch(e){
      setMsgs(p=>[...p,{role:'assistant',content:`⚠️ ${e.message}. Please try again!`,id:Date.now()}]);
    }finally{
      setBusy(false);
      setTimeout(()=>inpRef.current?.focus(),100);
    }
  },[msgs,inp,busy,apiKey]);

  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const onChg=e=>{setInp(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,130)+'px';};

  return(
    <div style={{minHeight:'100vh',background:'#0a0a0f',display:'flex',flexDirection:'column',alignItems:'center',padding:'12px',position:'relative',overflow:'hidden'}}>
      <Rain/>
      <div style={{position:'fixed',top:'8%',left:'3%',width:350,height:350,borderRadius:'50%',background:'radial-gradient(circle,#7209b712,transparent)',pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'fixed',bottom:'8%',right:'3%',width:280,height:280,borderRadius:'50%',background:'radial-gradient(circle,#4cc9f00e,transparent)',pointerEvents:'none',zIndex:0}}/>

      {/* Header */}
      <header style={{width:'100%',maxWidth:740,marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',position:'relative',zIndex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#4cc9f0,#4361ee,#7209b7)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,animation:'pulse-glow 3s ease-in-out infinite',flexShrink:0}}>⚡</div>
          <div>
            <h1 style={{fontFamily:"'Cinzel',serif",fontSize:'clamp(18px,4vw,28px)',fontWeight:900,margin:0,background:'linear-gradient(90deg,#4cc9f0,#f72585,#4cc9f0)',backgroundSize:'200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',animation:'shimmer 4s linear infinite',lineHeight:1.1}}>AKIRA</h1>
            <p style={{color:'#4cc9f055',fontSize:9,letterSpacing:'3px',textTransform:'uppercase',margin:0}}>Anime AI Expert</p>
          </div>
        </div>
        <div style={{display:'flex',gap:7}}>
          <button onClick={()=>setShowLib(!showLib)} className="hbtn" style={{background:'#ffffff08',border:'1px solid #ffffff0f',color:'#8890aa',padding:'6px 11px',borderRadius:20,fontSize:11,letterSpacing:'1px',transition:'all .2s'}}>📚 {showLib?'Hide':'Library'}</button>
          <button onClick={onOut} className="hbtn" style={{background:'#ffffff08',border:'1px solid #ffffff0f',color:'#8890aa',padding:'6px 11px',borderRadius:20,fontSize:11,transition:'all .2s'}} title="Change API Key">🔑</button>
        </div>
      </header>

      {/* Library */}
      {showLib&&(
        <div style={{width:'100%',maxWidth:740,marginBottom:10,background:'#0f0f1a',border:'1px solid #4361ee20',borderRadius:16,padding:'12px 14px',position:'relative',zIndex:2}}>
          <p style={{color:'#ffffff33',fontSize:9,letterSpacing:'2px',textTransform:'uppercase',marginBottom:8}}>Tap any anime to ask about it</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {ANIME.map(a=>(
              <button key={a} className="anime-tag" onClick={()=>{send(`Tell me about ${a}`);setShowLib(false);}} style={{background:'#4361ee0e',border:'1px solid #4361ee2a',color:'#8898cc',padding:'3px 10px',borderRadius:20,fontSize:11,transition:'all .15s'}}>{a}</button>
            ))}
          </div>
        </div>
      )}

      {/* Chat */}
      <div style={{width:'100%',maxWidth:740,background:'linear-gradient(180deg,#0d0d18,#0a0a12)',border:'1px solid #ffffff07',borderRadius:20,display:'flex',flexDirection:'column',boxShadow:'0 0 60px #4cc9f005,0 24px 80px #00000070',position:'relative',zIndex:1,height:'calc(100vh - 210px)',minHeight:300}}>
        <div style={{padding:'9px 16px',borderBottom:'1px solid #ffffff06',display:'flex',alignItems:'center',gap:7,background:'#0d0d1a',borderRadius:'20px 20px 0 0',flexShrink:0}}>
          {['#4cc9f0','#f72585','#7209b7'].map(c=><div key={c} style={{width:7,height:7,borderRadius:'50%',background:c,boxShadow:`0 0 6px ${c}`}}/>)}
          <span style={{color:'#ffffff2a',fontSize:9,letterSpacing:'2px',marginLeft:4}}>AKIRA ONLINE • {msgs.length-1} MESSAGES</span>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'14px 12px',display:'flex',flexDirection:'column',gap:12}}>
          {msgs.map(m=>(
            <div key={m.id} className="msg-in" style={{display:'flex',gap:9,flexDirection:m.role==='user'?'row-reverse':'row',alignItems:'flex-end'}}>
              <div style={{width:32,height:32,borderRadius:'50%',flexShrink:0,background:m.role==='user'?'linear-gradient(135deg,#f72585,#7209b7)':'linear-gradient(135deg,#4cc9f0,#4361ee)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,boxShadow:m.role==='user'?'0 0 10px #f7258540':'0 0 10px #4cc9f040'}}>{m.role==='user'?'👤':'⚡'}</div>
              <div style={{maxWidth:'78%',background:m.role==='user'?'linear-gradient(135deg,#f7258510,#7209b710)':'linear-gradient(135deg,#4cc9f00c,#4361ee0c)',border:m.role==='user'?'1px solid #f7258525':'1px solid #4cc9f01e',borderRadius:m.role==='user'?'18px 4px 18px 18px':'4px 18px 18px 18px',padding:'10px 14px',color:'#d8dff2',fontSize:14,lineHeight:1.7}}>
                <p style={{margin:0}} dangerouslySetInnerHTML={{__html:md(m.content)}}/>
              </div>
            </div>
          ))}
          {busy&&<div className="msg-in"><Dots/></div>}
          <div ref={botRef}/>
        </div>
      </div>

      {/* Suggestions */}
      {showSug&&msgs.length<=1&&(
        <div style={{width:'100%',maxWidth:740,marginTop:8,display:'flex',gap:5,flexWrap:'wrap',justifyContent:'center',position:'relative',zIndex:1}}>
          {SUGGESTIONS.map((s,i)=>(
            <button key={i} className="suggestion-pill" onClick={()=>send(s.replace(/[⚡🔥👑⚽🌀💀]/g,'').trim())} style={{background:'#111220',border:'1px solid #4361ee25',color:'#778899',padding:'5px 12px',borderRadius:20,fontSize:11,transition:'all .2s'}}>{s}</button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{width:'100%',maxWidth:740,marginTop:8,position:'relative',zIndex:1}}>
        <div style={{display:'flex',gap:8,background:'#0f0f1c',border:'1px solid #4361ee25',borderRadius:16,padding:'7px 7px 7px 13px',alignItems:'flex-end'}}>
          <textarea ref={inpRef} className="chat-input" value={inp} onChange={onChg} onKeyDown={onKey} placeholder="Ask about any anime — characters, power systems, arcs..." rows={1} style={{flex:1,background:'transparent',border:'1px solid transparent',color:'#e0e8ff',fontSize:14,fontWeight:500,padding:'6px 4px',minHeight:38,maxHeight:130,transition:'border-color .2s,box-shadow .2s',borderRadius:8,lineHeight:1.5}}/>
          <button className="send-btn" onClick={()=>send()} disabled={!inp.trim()||busy} style={{width:38,height:38,borderRadius:10,border:'none',background:inp.trim()&&!busy?'linear-gradient(135deg,#f72585,#7209b7)':'#1a1a28',color:'#fff',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',boxShadow:inp.trim()?'0 0 12px #f7258530':'none'}}>➤</button>
        </div>
        <p style={{textAlign:'center',color:'#ffffff12',fontSize:10,marginTop:4,letterSpacing:'1px'}}>ENTER TO SEND • SHIFT+ENTER FOR NEW LINE</p>
      </div>
    </div>
  );
}

function App(){
  const [key,setKey]=useState(null);
  useEffect(()=>{const s=sessionStorage.getItem('akira_k');if(s)setKey(s);},[]);
  if(!key)return <Setup onKey={k=>setKey(k)}/>;
  return <Chat apiKey={key} onOut={()=>{sessionStorage.removeItem('akira_k');setKey(null);}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
